# =============================================================
# ОСНОВНЫЕ НАСТРОЙКИ СЕРВЕРА
# =============================================================

# Публичный URL сервера — тот адрес, по которому клиенты
# будут обращаться к Headscale извне.
# Для продакшена раскомментируй строку ниже:
#server_url: https://headscale.yourdomain.com

# Для локального тестирования:
server_url: http://192.168.1.1


# -------------------------------------------------------------
# Адрес и порт, на которых сервер принимает входящие подключения.
# 0.0.0.0 означает "слушать на всех сетевых интерфейсах".
# Для продакшена:
#listen_addr: 0.0.0.0:443
# Для тестирования:
listen_addr: 0.0.0.0:8080


# -------------------------------------------------------------
# Адрес для сбора метрик (Prometheus).
# Рекомендуется оставить на localhost — метрики не должны
# быть доступны снаружи сервера.
metrics_listen_addr: 127.0.0.1:9090


# =============================================================
# НАСТРОЙКИ gRPC
# =============================================================

# Адрес для gRPC-интерфейса, который используется для
# удалённого управления сервером через CLI.
# Внимание: удалённое управление работает только
# при наличии действующего TLS-сертификата.
# Для продакшена:
#grpc_listen_addr: 0.0.0.0:50443
# Для тестирования (только локально):
grpc_listen_addr: 127.0.0.1:50443

# Разрешить gRPC работать без шифрования (INSECURE-режим).
# ⚠️  Не рекомендуется: весь трафик будет передаваться открытым текстом.
# Допустимо только если Headplane и Headscale работают
# на одной машине и трафик не покидает localhost.
grpc_allow_insecure: false


# =============================================================
# ПРОТОКОЛ NOISE (TS2021)
# =============================================================

# Шифрование трафика между Headscale и клиентами Tailscale
# осуществляется через протокол Noise. Здесь указывается путь
# к приватному ключу для этого протокола.
noise:
  private_key_path: /var/lib/headscale/noise_private.key


# =============================================================
# IP-АДРЕСА ДЛЯ УЗЛОВ СЕТИ (PREFIXES)
# =============================================================

# Диапазоны IP-адресов, из которых будут выдаваться адреса
# узлам сети. Должны быть подсетями поддерживаемых диапазонов:
#   IPv4: 100.64.0.0/10
#   IPv6: fd7a:115c:a1e0::/48
# Использование любых других диапазонов не поддерживается
# и приведёт к непредсказуемым ошибкам.
#
# Ссылки на исходный код Tailscale с допустимыми диапазонами:
# IPv6: https://github.com/tailscale/tailscale/blob/22ebb25e833264f58d7c3f534a8b166894a89536/net/tsaddr/tsaddr.go#LL81C52-L81C71
# IPv4: https://github.com/tailscale/tailscale/blob/22ebb25e833264f58d7c3f534a8b166894a89536/net/tsaddr/tsaddr.go#L33
prefixes:
  v4: 100.64.0.0/10
  v6: fd7a:115c:a1e0::/48

  # Стратегия выдачи IP-адресов новым узлам:
  #   - sequential (по умолчанию): следующий свободный адрес после последнего выданного
  #   - random: случайный свободный адрес (используется крипто-генератор)
  allocation: sequential


# =============================================================
# НАСТРОЙКИ DERP (РЕЛЕЙНЫЕ СЕРВЕРЫ)
# =============================================================

# DERP — система ретрансляции трафика, которую Tailscale
# использует когда прямое соединение между узлами невозможно
# (например, за двойным NAT).
# Подробнее: https://tailscale.com/blog/how-tailscale-works/#encrypted-tcp-relays-derp
derp:
  server:
    # Включить встроенный DERP-сервер.
    # ⚠️  Требует, чтобы server_url использовал HTTPS — DERP работает только через TLS.
    enabled: true

    # Идентификатор региона для встроенного DERP-сервера.
    # Если этот ID совпадает с ID из внешнего списка DERP-серверов,
    # приоритет будет у локального сервера.
    region_id: 999

    # Код и название региона — отображаются в интерфейсе Tailscale.
    region_code: "headscale"
    region_name: "Headscale Embedded DERP"

    # Адрес для приёма STUN-запросов по UDP.
    # STUN используется для определения внешнего IP и помощи с NAT traversal.
    # ⚠️  Обязателен при включённом встроенном DERP-сервере.
    # Подробнее: https://tailscale.com/blog/how-tailscale-works/
    stun_listen_addr: "0.0.0.0:3478"

    # Приватный ключ для шифрования трафика между DERP-сервером
    # и клиентами Tailscale. Если файл отсутствует — создаётся автоматически.
    private_key_path: /var/lib/headscale/derp_server_private.key

    # Автоматически добавлять встроенный DERP-сервер в DERP-карту.
    # Если установить false — сервер нужно добавить вручную через derp.paths.
    automatically_add_embedded_derp_region: true

    # Публичные IP-адреса этого сервера для DERP-карты.
    # Улучшает стабильность соединения, особенно при использовании
    # Exit-Node когда DNS может быть недоступен.
    ipv4: 1.2.3.4
    ipv6: 2001:db8::1

  # Список внешних DERP-карт в формате JSON (серверы Tailscale Inc.).
  urls:
    - https://controlplane.tailscale.com/derpmap/default

  # Локальные DERP-карты в формате YAML.
  # Используется если вы хостите собственные DERP-серверы:
  # https://tailscale.com/kb/1118/custom-derp-servers/
  #
  # paths:
  #   - /etc/headscale/derp-example.yaml
  paths: []

  # Автоматически обновлять DERP-карты из указанных источников.
  auto_update_enabled: true

  # Как часто проверять обновления DERP-карт.
  update_frequency: 24h


# =============================================================
# ПРОЧИЕ НАСТРОЙКИ
# =============================================================

# Отключить автоматическую проверку обновлений Headscale при запуске.
disable_check_updates: false

# Через какое время неактивный эфемерный узел будет удалён.
# Эфемерные узлы — это временные устройства без постоянной регистрации.
ephemeral_node_inactivity_timeout: 30m


# =============================================================
# БАЗА ДАННЫХ
# =============================================================

database:
  # Тип базы данных. Доступные варианты: sqlite, postgres.
  # ⚠️  Postgres поддерживается только для совместимости со старыми установками
  # и крайне не рекомендуется. Вся разработка и оптимизации ведутся под SQLite.
  type: sqlite

  # Режим отладки для запросов к БД.
  # Требует установки log.level в "debug" или "trace".
  debug: false

  # Настройки ORM-библиотеки GORM.
  gorm:
    # Использовать подготовленные запросы (prepared statements) для ускорения работы.
    prepare_stmt: true

    # Использовать параметризованные запросы для защиты от SQL-инъекций.
    parameterized_queries: true

    # Не логировать ошибки "запись не найдена" — они не являются критическими.
    skip_err_record_not_found: true

    # Порог для логирования медленных запросов (в миллисекундах).
    slow_threshold: 1000

  # Настройки SQLite.
  sqlite:
    path: /var/lib/headscale/db.sqlite

    # Включить режим WAL (Write-Ahead Log).
    # Рекомендуется для продакшена: улучшает производительность при параллельных операциях.
    # Подробнее: https://www.sqlite.org/wal.html
    write_ahead_log: true

    # Максимальное количество фреймов в WAL-файле до автоматического
    # контрольного сохранения (checkpoint). 0 — отключить автоcheckpoint.
    # Подробнее: https://www.sqlite.org/c3ref/wal_autocheckpoint.html
    wal_autocheckpoint: 1000

  # Настройки Postgres (не рекомендуется, только для legacy-установок).
  # postgres:
  #   # Для подключения через Unix-сокет укажи путь к сокету в поле host,
  #   # а поле port оставь пустым.
  #   host: localhost
  #   port: 5432
  #   name: headscale
  #   user: foo
  #   pass: bar
  #   max_open_conns: 10
  #   max_idle_conns: 10
  #   conn_max_idle_time_secs: 3600
  #   # Режим SSL. Если нужен особый режим вместо стандартных true/false,
  #   # укажи значение вручную (см. https://www.postgresql.org/docs/current/libpq-ssl.html).
  #   ssl: false


# =============================================================
# НАСТРОЙКИ TLS
# =============================================================

# --- Let's Encrypt / ACME ---
# Headscale поддерживает автоматическое получение TLS-сертификатов
# через Let's Encrypt.

# URL директории ACME (Let's Encrypt).
acme_url: https://acme-v02.api.letsencrypt.org/directory

# Email для регистрации у ACME-провайдера.
# Let's Encrypt отправляет на него уведомления об истечении сертификатов.
acme_email: ""

# Доменное имя, для которого запрашивается сертификат.
tls_letsencrypt_hostname: ""

# Директория для хранения сертификатов и метаданных Let's Encrypt.
tls_letsencrypt_cache_dir: /var/lib/headscale/cache

# Тип ACME-проверки. Доступные варианты:
#   HTTP-01     — Let's Encrypt обращается по HTTP на порт 80 (самый простой)
#   TLS-ALPN-01 — проверка через TLS на порту 443
# Подробнее: docs/ref/tls.md
tls_letsencrypt_challenge_type: HTTP-01

# При выборе HTTP-01 Let's Encrypt будет обращаться на этот адрес
# для подтверждения владения доменом. ":http" означает порт 80.
tls_letsencrypt_listen: ":http"

# --- Использование готовых сертификатов ---
# Если у тебя уже есть сертификат — укажи пути к файлам.
# Оставь пустыми если используешь Let's Encrypt или HTTP.
tls_cert_path: ""
tls_key_path: ""


# =============================================================
# ЛОГИРОВАНИЕ
# =============================================================

log:
  # Формат вывода логов:
  #   text — читаемый текст (удобно для разработки)
  #   json — машиночитаемый формат (удобно для систем сбора логов)
  format: text

  # Уровень логирования: debug, info, warn, error.
  # Для продакшена рекомендуется info.
  level: info


# =============================================================
# ПОЛИТИКИ ДОСТУПА (ACL)
# =============================================================

# Headscale поддерживает ACL-политики Tailscale для управления
# тем, какие устройства могут взаимодействовать друг с другом.
# Подробнее: https://tailscale.com/kb/1018/acls/
policy:
  # Где хранятся ACL-политики:
  #   database — политики хранятся в БД и управляются через API/UI
  #   file     — политики читаются из HuJSON-файла
  mode: database

  # Путь к HuJSON-файлу с политиками (только если mode: file).
  path: ""


# =============================================================
# НАСТРОЙКИ DNS
# =============================================================

# Headscale поддерживает конфигурацию DNS и MagicDNS от Tailscale,
# позволяя обращаться к устройствам в сети по именам, а не IP.
#
# Полезные ссылки:
#   https://tailscale.com/kb/1054/dns/
#   https://tailscale.com/kb/1081/magicdns/
#
# ⚠️  Для работы DNS-настроек клиенты должны иметь включённую
# опцию --accept-dns=true (включена по умолчанию).
# При включении DNS Headscale будет управлять /etc/resolv.conf на клиентах:
# https://tailscale.com/kb/1235/resolv-conf
#
# Чтобы полностью отключить управление DNS — оставь все поля пустыми.
dns:
  # Включить MagicDNS — автоматическое разрешение имён устройств в сети.
  # https://tailscale.com/kb/1081/magicdns/
  magic_dns: true

  # Базовый домен для MagicDNS. Устройства будут доступны по адресу:
  # hostname.base_domain (например, myhost.example.com).
  # ⚠️  Должен отличаться от домена в server_url.
  # Должен быть полным доменным именем (FQDN) без точки в конце.
  base_domain: example.com

  # DNS-серверы, которые будут переданы клиентам сети.
  nameservers:
    # Глобальные DNS-серверы (используются для всех запросов).
    global:
      - 1.1.1.1         # Cloudflare IPv4 (основной)
      - 1.0.0.1         # Cloudflare IPv4 (резервный)
      - 2606:4700:4700::1111  # Cloudflare IPv6 (основной)
      - 2606:4700:4700::1001  # Cloudflare IPv6 (резервный)

      # NextDNS (см. https://tailscale.com/kb/1218/nextdns/).
      # Замени "abc123" на свой ID в NextDNS.
      # - https://dns.nextdns.io/abc123

    # Split DNS — использовать разные DNS-серверы для разных доменов.
    # https://tailscale.com/kb/1054/dns/
    split:
      {}
      # Примеры:
      # foo.bar.com:
      #   - 1.1.1.1
      # darp.headscale.net:
      #   - 1.1.1.1
      #   - 8.8.8.8

  # Дополнительные домены поиска. При включённом MagicDNS
  # base_domain всегда добавляется первым автоматически.
  search_domains: []

  # Дополнительные DNS-записи для устройств в сети.
  # Поддерживаются только записи типа A и AAAA.
  # Подробнее: docs/ref/dns.md
  extra_records: []
  # Примеры:
  #   - name: "grafana.myvpn.example.com"
  #     type: "A"
  #     value: "100.64.0.3"
  #
  #   # Можно записать в одну строку:
  #   - { name: "prometheus.myvpn.example.com", type: "A", value: "100.64.0.3" }
  #
  # Также записи можно загружать из JSON-файла.
  # Headscale автоматически применяет изменения при изменении файла.
  # extra_records_path: /var/lib/headscale/extra-records.json


# =============================================================
# UNIX-СОКЕТ
# =============================================================

# Unix-сокет для подключения CLI без аутентификации.
# ⚠️  Убедись, что файл сокета доступен только доверенным пользователям.
unix_socket: /var/run/headscale/headscale.sock
unix_socket_permission: "0770"


# =============================================================
# OPENID CONNECT (OIDC) — ЭКСПЕРИМЕНТАЛЬНО
# =============================================================

# Поддержка входа через внешний провайдер идентификации (Keycloak,
# Google, GitHub и т.д.). Функция экспериментальная.
#
# oidc:
#   # Не запускать Headscale если OIDC-провайдер недоступен при старте.
#   only_start_if_oidc_is_available: true
#
#   # URL OIDC-провайдера (issuer).
#   issuer: "https://your-oidc.issuer.com/path"
#
#   # Идентификатор и секрет клиента OIDC.
#   client_id: "your-oidc-client-id"
#   client_secret: "your-oidc-client-secret"
#
#   # Альтернатива: читать секрет из файла (поддерживает переменные окружения,
#   # удобно для интеграции с systemd LoadCredential).
#   client_secret_path: "${CREDENTIALS_DIRECTORY}/oidc_client_secret"
#   # client_secret и client_secret_path являются взаимоисключающими.
#
#   # Время жизни сессии узла после аутентификации через OIDC.
#   # "0" означает без срока истечения.
#   expiry: 180d
#
#   # Использовать срок действия из токена OIDC вместо значения expiry выше.
#   # Включай только если понимаешь последствия — клиенты будут часто
#   # требовать повторной аутентификации.
#   use_expiry_from_token: false
#
#   # Области доступа (scopes) для OIDC-потока.
#   # По умолчанию: openid, profile, email.
#   scope: ["openid", "profile", "email", "custom"]
#
#   # Дополнительные параметры запроса авторизации.
#   extra_params:
#     domain_hint: example.com
#
#   # Список разрешённых доменов, групп и пользователей.
#   # Пользователи вне этих списков получат отказ при входе.
#   allowed_domains:
#     - example.com
#   # Примечание: группы из Keycloak имеют ведущий символ '/'.
#   allowed_groups:
#     - /headscale
#   allowed_users:
#     - alice@example.com
#
#   # PKCE (Proof Key for Code Exchange) — дополнительная защита
#   # кода авторизации от перехвата. Рекомендуется включить.
#   # https://datatracker.ietf.org/doc/html/rfc7636
#   pkce:
#     enabled: false
#     # Метод PKCE:
#     #   plain — открытый верификатор (не рекомендуется)
#     #   S256  — верификатор через SHA256 (рекомендуется)
#     method: S256
#
#   # Сопоставить устаревших пользователей (до версии 0.24.0) с новыми
#   # OIDC-пользователями по имени. Используй при миграции на OIDC.
#   # ⚠️  Существует риск захвата аккаунта если имя пользователя изменилось
#   # у провайдера. Для новых установок устанавливай false.
#   # Эта опция будет удалена в будущих версиях.
#   map_legacy_users: false


# =============================================================
# LOGTAIL (ЛОГИРОВАНИЕ TAILSCALE)
# =============================================================

# Logtail — инфраструктура логирования и аудита Tailscale Inc.
# ⚠️  При включении клиенты будут отправлять логи на серверы Tailscale Inc.
# Для self-hosted установки рекомендуется держать отключённым.
logtail:
  enabled: false


# =============================================================
# ПРОЧИЕ НАСТРОЙКИ КЛИЕНТОВ
# =============================================================

# Использовать случайный порт для трафика WireGuard вместо
# стандартного статического порта 41641.
# Помогает обойти проблемы с некоторыми "умными" файрволами.
# Подробнее: https://tailscale.com/kb/1181/firewalls/
randomize_client_port: false
